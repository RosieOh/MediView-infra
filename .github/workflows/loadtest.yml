name: loadtest
on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "대상 BASE_URL (예: https://api.mediview.example.com)"
        required: true
      target_path:
        description: "요청 경로"
        required: false
        default: "/actuator/health"
      fault:
        description: "알림 검증용 에러 유발 (1=on)"
        required: false
        default: "0"

jobs:
  k6:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run k6
        uses: grafana/k6-action@v0.3.1
        with:
          filename: loadtest/k6-smoke.js
        env:
          BASE_URL: ${{ inputs.base_url }}
          TARGET_PATH: ${{ inputs.target_path }}
          FAULT: ${{ inputs.fault }}
      - name: Summary 안내
        if: always()
        run: |
          echo "부하 주입 후 Grafana(JVM/Business) 및 Alertmanager 에서 지표/알림을 확인하세요."
          echo "fault=1 로 실행 시 5xx 유발 → Http5xxElevated / ErrorBudgetBurn 알림이 발동할 수 있습니다."
