# coturn (TURN/STUN) — MediView 화상 진료용 미디어 릴레이
# 비밀값(realm/secret/external-ip)은 docker-compose 의 command 로 주입한다(여기 두지 않는다).

listening-port=3478
tls-listening-port=5349
fingerprint

# 시간제한 자격증명 방식(REST API). 백엔드가 static-auth-secret 으로 단기 username/credential 을 발급한다.
use-auth-secret

# 릴레이 UDP 포트 범위 — 방화벽/보안그룹에서 UDP 로 반드시 열어야 한다.
min-port=49160
max-port=49200

# 하드닝
no-cli
no-tcp-relay
no-multicast-peers
stale-nonce=600

# 사설/특수 대역으로의 릴레이 차단 (SSRF/내부망 스캔 방지)
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=::1
denied-peer-ip=fc00::-fdff:ffff:ffff:ffff:ffff:ffff:ffff:ffff
denied-peer-ip=fe80::-febf:ffff:ffff:ffff:ffff:ffff:ffff:ffff

# turns:(TLS) 를 쓰려면 인증서를 마운트하고 아래 주석을 해제한다.
# cert=/etc/coturn/certs/fullchain.pem
# pkey=/etc/coturn/certs/privkey.pem

log-file=stdout
