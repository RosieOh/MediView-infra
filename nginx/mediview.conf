# MediView 리버스 프록시
#   api.mediview.example.com    → Spring 백엔드(REST + WebSocket)
#   admin.mediview.example.com  → 관리자(Next.js)
#   mediview.example.com        → 랜딩(Next.js)
#
# 업스트림 포트는 각 서비스 실행 포트에 맞게 조정하세요.

upstream mediview_backend { server 127.0.0.1:8080; keepalive 32; }
upstream mediview_landing { server 127.0.0.1:3000; keepalive 16; }
upstream mediview_admin   { server 127.0.0.1:3100; keepalive 16; }

# 공통 프록시 헤더
map $http_upgrade $connection_upgrade { default upgrade; '' close; }

# ---- HTTP → HTTPS (+ certbot 챌린지) ----
server {
    listen 80;
    listen [::]:80;
    server_name mediview.example.com api.mediview.example.com admin.mediview.example.com;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# ---- API + WebSocket ----
server {
    listen 443 ssl;
    http2 on;
    server_name api.mediview.example.com;

    ssl_certificate     /etc/letsencrypt/live/api.mediview.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.mediview.example.com/privkey.pem;

    # 의료 첨부 업로드 한도 (백엔드 multipart 50MB 와 일치)
    client_max_body_size 50m;

    # REST
    location /api/ {
        proxy_pass http://mediview_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket (채팅 /ws/chat, WebRTC 시그널링 /ws/webrtc)
    location /ws/ {
        proxy_pass http://mediview_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;   # 장수명 연결(진료 세션) 유지
        proxy_send_timeout  3600s;
    }

    # Swagger 는 운영에서 닫혀 있음(application-prod). 필요 시 IP 화이트리스트로만 개방.
}

# ---- 관리자(Next.js) ----
server {
    listen 443 ssl;
    http2 on;
    server_name admin.mediview.example.com;
    ssl_certificate     /etc/letsencrypt/live/admin.mediview.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.mediview.example.com/privkey.pem;

    location / {
        proxy_pass http://mediview_admin;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;   # Next.js HMR/websocket
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---- 랜딩(Next.js) ----
server {
    listen 443 ssl;
    http2 on;
    server_name mediview.example.com;
    ssl_certificate     /etc/letsencrypt/live/mediview.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mediview.example.com/privkey.pem;

    location / {
        proxy_pass http://mediview_landing;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
