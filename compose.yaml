# MediView 전체 스택. 앱 이미지는 각 저장소 CI 가 GHCR 로 빌드/푸시한다.
# 배포: 서버에서  cp .env.example .env  → 값 채우고  docker compose pull && docker compose up -d
name: mediview

services:
  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME:-mediview}
      MARIADB_USER: ${DB_USER:-mediview}
      MARIADB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?set DB_ROOT_PASSWORD in .env}
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    image: ghcr.io/rosieoh/mediview-backend:latest
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/${DB_NAME:-mediview}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-mediview}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:?}
      JWT_SECRET: ${JWT_SECRET:?}                       # Base64 32B+
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:?}       # Base64 32B (민감 컬럼 암호화)
      CORS_ALLOWED_ORIGIN_PATTERNS: ${CORS_ALLOWED_ORIGIN_PATTERNS:-https://*.mediview.example.com}
      TURN_ENABLED: "true"
      TURN_HOST: ${TURN_REALM:?}
      TURN_STATIC_AUTH_SECRET: ${TURN_SECRET:?}         # coturn TURN_SECRET 과 동일해야 함
    expose:
      - "8080"

  ai:
    image: ghcr.io/rosieoh/mediview-ai:latest
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    expose:
      - "8001"

  landing:
    image: ghcr.io/rosieoh/mediview-landing:latest
    restart: unless-stopped
    expose:
      - "3000"

  admin:
    image: ghcr.io/rosieoh/mediview-admin:latest
    restart: unless-stopped
    expose:
      - "3001"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on: [backend, landing, admin]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./stack/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro           # fullchain.pem / privkey.pem (또는 certbot)
      - ./certbot/www:/var/www/certbot:ro

  # TURN 은 넓은 UDP 릴레이 포트 때문에 host 네트워크를 사용한다.
  coturn:
    image: coturn/coturn:4.6-alpine
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    command:
      - -c
      - /etc/coturn/turnserver.conf
      - --external-ip=${EXTERNAL_IP:?}
      - --realm=${TURN_REALM:?}
      - --server-name=${TURN_REALM}
      - --static-auth-secret=${TURN_SECRET:?}

volumes:
  db-data:
