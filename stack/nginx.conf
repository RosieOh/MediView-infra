# docker-compose 용 nginx (업스트림 = compose 서비스명)
map $http_upgrade $connection_upgrade { default upgrade; '' close; }

upstream backend { server backend:8080; }
upstream landing { server landing:3000; }
upstream admin   { server admin:3001; }

server {
    listen 80;
    server_name _;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# API + WebSocket
server {
    listen 443 ssl;
    http2 on;
    server_name api.mediview.example.com;
    ssl_certificate     /etc/letsencrypt/live/api.mediview.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.mediview.example.com/privkey.pem;
    client_max_body_size 50m;

    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name admin.mediview.example.com;
    ssl_certificate     /etc/letsencrypt/live/admin.mediview.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.mediview.example.com/privkey.pem;
    location / {
        proxy_pass http://admin;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name mediview.example.com;
    ssl_certificate     /etc/letsencrypt/live/mediview.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mediview.example.com/privkey.pem;
    location / {
        proxy_pass http://landing;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
