# Grafana 서브도메인. monitoring 오버레이가 nginx 에 이 파일을 마운트할 때만 로드된다.
# grafana 컨테이너가 없을 때 nginx 기동이 실패하지 않도록 resolver 로 지연 해석한다.
# 인증: Grafana 자체 로그인(admin) + TLS. 최초 인증서는 init-letsencrypt.sh(그라파나 도메인 포함).
server {
    listen 443 ssl;
    http2 on;
    server_name grafana.mediview.example.com;

    ssl_certificate     /etc/letsencrypt/live/grafana.mediview.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/grafana.mediview.example.com/privkey.pem;

    resolver 127.0.0.11 valid=30s;   # docker embedded DNS
    location / {
        set $grafana grafana:3000;
        proxy_pass http://$grafana;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;         # Grafana Live(WebSocket)
        proxy_set_header Connection        $connection_upgrade;
    }
}
