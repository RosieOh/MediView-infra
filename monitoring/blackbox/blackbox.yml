modules:
  http_2xx:
    prober: http
    timeout: 5s
    http:
      valid_status_codes: []          # 기본 2xx
      method: GET
      fail_if_ssl: false
      fail_if_not_ssl: false
      preferred_ip_protocol: ip4

  http_2xx_tls:
    prober: http
    timeout: 5s
    http:
      method: GET
      fail_if_not_ssl: true           # TLS 필수(https)
      preferred_ip_protocol: ip4

  tcp_connect:
    prober: tcp
    timeout: 5s
