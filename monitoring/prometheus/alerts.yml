groups:
  - name: mediview
    rules:
      - alert: TargetDown
        expr: up == 0
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "타겟 다운: {{ $labels.job }} ({{ $labels.instance }})"

      - alert: BackendDown
        expr: up{job="backend"} == 0
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "백엔드 actuator 응답 없음 (2분+)"

      - alert: HighContainerCpu
        expr: sum(rate(container_cpu_usage_seconds_total{name!=""}[5m])) by (name) > 0.9
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "{{ $labels.name }} CPU 사용 높음 (>0.9 core, 10분+)"

      - alert: JvmHeapHigh
        expr: >-
          sum(jvm_memory_used_bytes{area="heap"}) by (application)
          / sum(jvm_memory_max_bytes{area="heap"}) by (application) > 0.9
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "{{ $labels.application }} JVM heap 90%+ (5분+)"

      - alert: Http5xxElevated
        expr: >-
          sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
          / sum(rate(http_server_requests_seconds_count[5m])) > 0.05
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "5xx 응답 비율 5% 초과 (5분+)"

      - alert: ProbeDown
        expr: probe_success == 0
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "외부 프로빙 실패: {{ $labels.instance }} (2분+)"

      - alert: ProbeSslExpiringSoon
        expr: (probe_ssl_earliest_cert_expiry - time()) < 86400 * 14
        for: 1h
        labels: { severity: warning }
        annotations:
          summary: "TLS 인증서 만료 임박(<14일): {{ $labels.instance }}"
