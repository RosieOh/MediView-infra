# 모니터링/로그 오버레이. 메인 스택과 함께 올린다:
#   docker compose -f compose.yaml -f monitoring/compose.monitoring.yml up -d
name: mediview

services:
  # 메인 스택의 nginx 에 Grafana 서브도메인 conf 를 얹는다(오버레이 볼륨 병합).
  nginx:
    volumes:
      - ./stack/nginx.grafana.conf:/etc/nginx/conf.d/grafana.conf:ro
      - ./monitoring/nginx-secrets:/etc/nginx/secrets:ro   # grafana.htpasswd (gitignore)

  prometheus:
    image: prom/prometheus:v2.55.0
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    expose:
      - "9090"

  grafana:
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    depends_on: [prometheus, loki]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-https://grafana.mediview.example.com}
      GF_SERVER_DOMAIN: ${GRAFANA_DOMAIN:-grafana.mediview.example.com}
      GF_AUTH_BASIC_ENABLED: "false"   # nginx basic-auth 와 충돌 방지(Grafana 는 세션 로그인 사용)
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3300:3000"   # 로컬 바인딩. 외부 노출은 nginx(별도 서브도메인)로.

  loki:
    image: grafana/loki:3.2.0
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/config.yml:ro
      - ./monitoring/loki/rules:/etc/loki/rules:ro
      - loki-data:/loki
    expose:
      - "3100"

  promtail:
    image: grafana/promtail:3.2.0
    restart: unless-stopped
    depends_on: [loki]
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    expose:
      - "8080"

  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro,rslave
    expose:
      - "9100"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./monitoring/alertmanager/secrets:/etc/alertmanager/secrets:ro   # slack_url, smtp_password (gitignore)
      - alertmanager-data:/alertmanager
    expose:
      - "9093"

  blackbox:
    image: prom/blackbox-exporter:v0.25.0
    restart: unless-stopped
    volumes:
      - ./monitoring/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
    expose:
      - "9115"

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
  alertmanager-data:
