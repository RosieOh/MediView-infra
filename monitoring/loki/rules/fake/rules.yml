groups:
  - name: mediview-logs
    rules:
      - alert: ErrorLogSpike
        expr: |
          sum(rate({service=~"backend|ai"} |~ "(?i)error|exception|traceback" [5m])) > 1
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "에러 로그 급증: 최근 5분 에러 rate > 1/s"

      - alert: BackendErrorBurst
        expr: |
          sum(count_over_time({service="backend"} |~ "(?i)error|exception" [1m])) > 20
        for: 2m
        labels: { severity: warning }
        annotations:
          summary: "백엔드 에러 로그 급증 (1분 20건+)"
